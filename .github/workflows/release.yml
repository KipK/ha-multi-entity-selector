name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, release, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta)[0-9]+)?$ ]]; then
            echo "Tag '${tag}' must match 1.0.0, 1.0.0-rc1, or 1.0.0-beta1." >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "${package_version}" != "${tag}" ]]; then
            echo "package.json version '${package_version}' does not match tag '${tag}'." >&2
            exit 1
          fi

          npm_tag="latest"
          prerelease="false"
          if [[ "${tag}" == *"-rc"* ]]; then
            npm_tag="rc"
            prerelease="true"
          elif [[ "${tag}" == *"-beta"* ]]; then
            npm_tag="beta"
            prerelease="true"
          fi

          echo "npm_tag=${npm_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          npm pack --pack-destination release
          mapfile -t tarballs < <(find release -maxdepth 1 -type f -name "*.tgz" | sort)

          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "Expected exactly one npm tarball in release/, found ${#tarballs[@]}." >&2
            printf '%s\n' "${tarballs[@]}" >&2
            exit 1
          fi

          echo "tarball=$(realpath "${tarballs[0]}")" >> "${GITHUB_OUTPUT}"

      - name: Pack browser dist artifact
        run: |
          zip -r "release/ha-multi-entity-selector-${GITHUB_REF_NAME}-dist.zip" dist README.md package.json

      - name: Publish to npm
        shell: bash
        env:
          NPM_TAG: ${{ steps.version.outputs.npm_tag }}
        run: |
          set -euo pipefail

          npm publish --access public --tag "${NPM_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "ha-multi-entity-selector ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}" \
            "${prerelease_flag[@]}"
